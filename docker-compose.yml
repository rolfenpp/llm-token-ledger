services:
  postgres:
    image: ankane/pgvector:latest
    container_name: llm-token-ledger-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: flight_recorder
      POSTGRES_PASSWORD: flight_recorder_password
      POSTGRES_DB: flight_recorder
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flight_recorder -d flight_recorder"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
